name: CI & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  C3_BASE_URL: https://github.com/c3lang/c3c/releases/download/latest-prerelease-tag

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: c3fmt-linux
            artifact-path: build/c3fmt
          - os: macos-latest
            artifact-name: c3fmt-macos
            artifact-path: build/c3fmt
          - os: windows-latest
            artifact-name: c3fmt-windows
            artifact-path: build/c3fmt.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install C3 compiler
        run: |
          case "$RUNNER_OS" in
            Linux)
              curl -fsSL -o c3.tar.gz $C3_BASE_URL/c3-linux.tar.gz
              tar -xzf c3.tar.gz ;;
            macOS)
              curl -fsSL -o c3.zip $C3_BASE_URL/c3-macos.zip
              tar -xf c3.zip ;;
            Windows)
              curl -fsSL -o c3.zip $C3_BASE_URL/c3-windows.zip
              unzip -q c3.zip ;;
          esac
          echo "$PWD/c3" >> $GITHUB_PATH

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action@v2
        with:
          install-lib: true
          install-cli: false

      - name: Run tests
        run: c3c test --test-show-output -L "${{ runner.tool_cache }}/tree-sitter/lib/lib"

      - name: Compile formatted standard library
        working-directory: test/stdlib
        run: c3c build

      - name: Setup static build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y musl-tools musl-dev cmake
          c3c build build-ts-lib --trust=full
          MUSL_PATH=$(find /usr/lib -maxdepth 3 -name 'crt1.o' -path '*musl*' | head -1 | xargs dirname)
          sed -i "s|/usr/lib/musl/lib|$MUSL_PATH|g" project.json

      - name: Build c3fmt
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            c3c build c3fmt-static
            build/c3fmt c3/lib/std/collections/ > /dev/null
          else
            c3c build c3fmt -L "${{ runner.tool_cache }}/tree-sitter/lib/lib"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  release:
    name: Create Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: staging

      - name: Prepare release files
        run: |
          mkdir dist
          mv staging/c3fmt-linux/c3fmt        dist/c3fmt-linux
          mv staging/c3fmt-macos/c3fmt        dist/c3fmt-macos
          mv staging/c3fmt-windows/c3fmt.exe  dist/c3fmt-windows.exe

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          generateReleaseNotes: true
          allowUpdates: true
